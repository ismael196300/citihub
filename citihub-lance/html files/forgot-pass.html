<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CITIHUB</title>
   <link rel="stylesheet" href="../css files/intro.css">
    <script src="https://unpkg.com/boxicons@2.1.4/dist/boxicons.js"></script>
    <script type="text/javascript"
    src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js">
    </script>
      
    <link rel="shortcut icon" href="citihub.png" type="image/x-icon">
</head>
<body>
    <div class="wrapper">
        <div class="heade">
            <img src="logo.png" alt="LOGO" class="logo" width="60px" height="60px">
            <p><span>CITIHUB</span></p>
        </div>
        <div class="div-move" id="div-move">
            <h2 class="title-login">RECOVER PASSWORD</h2>
            
            <div class="input-box" id="input-username">
                <box-icon type='solid' name='user'></box-icon>
                <input type="text" name="username" id="loginUsername" placeholder="Username or Email" required autocomplete="username">
            </div>
            
         
            
            <button type="button" class="btnLogin" id="btnLogin">Check Account</button>
                          
            <div class="sign-up-link"></div>
            <p class="btn-signup">Already have an account? <a href="intro.html"> Log in here</a></p>
          
        </div>
    </div>
      <script src="../js files/forgot-pass.js"></script>
</body>
</html>
