<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Citihub</title>
    <link rel="stylesheet" href="../css files/register.css">
    <script src="https://unpkg.com/boxicons@2.1.4/dist/boxicons.js"></script>
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
 <!-- Firebase core -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>

<!-- Firebase products you need -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>


    <link rel="shortcut icon" href="logo.png" type="image/x-icon">
</head>
<body>
   
<form id="registerForm">

<div class="wrapper">
    <h2>Register</h2>

    <p class="message-code-para">A Verfication Code <br>has been sent to your Email.</p>

    <div class="input-box">  
        <box-icon type='solid' name='envelope'></box-icon>
        <input type="email" name="email" id="newEmail" required placeholder="Email" autocomplete="email">
    </div>

    <p id="emailPara" class="email-paragraph"></p>

    <div class="input-box">
        <box-icon type='solid' name='user'></box-icon>
        <input type="text" name="newName" id="username" required placeholder="Username" autocomplete="username" maxlength="30">
    </div>

    <p id="new-user" class="new-user-para"></p>

    <div class="gender-selection">
        <div class="gender-options">

            <div class="radio-option">
                <input type="radio" id="male" name="gender" value="male" required>
                <label for="male">Male</label>
            </div>

            <div class="radio-option">
                <input type="radio" id="female" name="gender" value="female" required>
                <label for="female">Female</label>
            </div>

            <div class="radio-option">
                <input type="radio" id="bisexual" name="gender" value="bisexual" required>
                <label for="bisexual">Bisexual</label>
            </div>

        </div>
    </div>

    <div class="input-box">   
        <box-icon type='solid' name='lock-alt' class="imgLock" title="Show Password" id="logoPassword" onclick="togglePasswordVisibility()"></box-icon>
        <input type="password" id="loginPassword" name="password" placeholder="Password" required maxlength="16">
    </div>

    <div class="input-box">   
        <box-icon type='solid' name='lock-alt' class="imgConLock" title="Show Password" id="logoConPassword" onclick="toggleConfirmPasswordVisibility()"></box-icon>
        <input type="password" id="confirmPassword" name="confirmpassword" placeholder="Confirm Password" required maxlength="15">
    </div>

    <p id="confirm-pass-para" class="confirm-pass-para"></p>

    <div class="input-box">   
        <box-icon type='solid' name='lock-alt' class="imgLock"></box-icon>
        <input type="text" class="emailOtp" id="emailOtp" name="code" inputmode="numeric" placeholder="Code" required maxlength="6">
    </div>

    <button type="button" id="sendOtpBtn" class="sendOtpBtn">Send OTP</button>

    <p class="email-code-para" id="email-code-para">Incorrect email code.</p>

    <div class="g-recaptcha" data-sitekey="6LfdIaopAAAAAInMdxYUSveOrk5-FCDRBBoaNC2x"></div>

    <p class="not-robot-para" id="not-robot-para">Please verify that you are not a Robot.</p>

    <div class="chckTermsdiv">
        <input type="checkbox" id="termsCheckbox" name="terms" required>
        <label for="termsCheckbox">
            I agree to the <a href="terms.html">Terms and Conditions</a>
        </label>
    </div>

    <p class="terms-para" id="terms-para">Please agree to the Terms and Conditions.</p>

    <button type="submit" class="btnCreateAccount" id="btnCreateAccount">
        Create Account
    </button>

    <div class="log-in-link">
        <p>Already have an account? <a href="intro.html">Log In</a></p>
    </div>

</div>

</form>
   
    <script src="../js files/register.js"></script>
    </body>
 
</html>
