<!DOCTYPE html>
<html>
<head>
  <title>Supabase App</title>
</head>
<body>

<h2>Register / Login</h2>

<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br>
<input id="username" placeholder="Username"><br>
<input type="file" id="file"><br><br>

<button onclick="signUp()">Sign Up</button>
<button onclick="login()">Login</button>
<button onclick="upload()">Upload Data</button>


<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

const supabaseUrl = "https://phaaiyizufqkekesgtfk.supabase.co";
const supabaseKey = "sb_publishable_tqN8S3XqS2jhViHOEEeUaw_b4Pjg8lo";

const supabase = createClient(supabaseUrl, supabaseKey);

// SIGN UP
window.signUp = async function () {
  const { error } = await supabase.auth.signUp({
    email: emailInput(),
    password: passwordInput()
  });

  if (error) return alert(error.message);
  alert("Signed up!");
}

// LOGIN
window.login = async function () {
  const { error } = await supabase.auth.signInWithPassword({
    email: emailInput(),
    password: passwordInput()
  });

  if (error) return alert(error.message);
  alert("Logged in!");
}

// UPLOAD
window.upload = async function () {
  const file = document.getElementById("file").files[0];
  const username = document.getElementById("username").value;

  if (!file) return alert("Select a file!");

  const { data: { user } } = await supabase.auth.getUser();
  if (!user) return alert("Login first!");

  const fileName = Date.now() + "-" + file.name;

  const { error } = await supabase.storage
    .from('images')
    .upload('public/' + fileName, file);

  if (error) return alert(error.message);

  const { data } = supabase.storage
    .from('images')
    .getPublicUrl('public/' + fileName);

  await supabase.from('users').insert([
    { username, image_url: data.publicUrl }
  ]);

  alert("Saved!");
}

function emailInput() {
  return document.getElementById("email").value;
}

function passwordInput() {
  return document.getElementById("password").value;
}
</script>

</body>
</html>
