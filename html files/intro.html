<!DOCTYPE html>
<html lang="en">
<head>
    <script>
       if (localStorage.getItem("loggedIn") === "true")window.location.href = "main.html";
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CITIHUB</title>
   <link rel="stylesheet" href="../css files/intro.css">
    <script src="https://unpkg.com/boxicons@2.1.4/dist/boxicons.js"></script>
   
    </script>
      
    <link rel="shortcut icon" href="../images/citihub.png" type="image/x-icon">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>
    <form action="" id="loginForm"> 
         <div class="wrapper">
        <div class="heade">
            <img src="../images/citihub.png" alt="LOGO" class="logo" width="60px" height="60px">
            <p><span>CITIHUB</span></p>
        </div>
        <div class="div-move" id="div-move">
            <h2 class="title-login">Log In</h2>
            
            <div class="input-box" id="input-username">
                <box-icon type='solid' name='user'></box-icon>
                <input type="text" name="username" id="loginUsername" placeholder="Username or Email" required autocomplete="username">
            </div>
            <div class="input-box" id="input-password">   
                <box-icon type='solid' name='lock-alt' class="imgLock" title="Show Password" id="logoPassword" onclick="togglePasswordVisibility()"></box-icon>
                <input type="password" id="loginPassword" name="password" placeholder="Password" required autocomplete="current-password">
            </div>
            
            <div class="login-options">
                <div class="remember-me">
                    <input type="checkbox" id="rememberMe">
                    <label for="rememberMe">Remember Me</label>
                </div>
                <a href="forgot-pass.html" class="forgot-password">Forgot Password?</a>
            </div>
            
            <button type="submit" class="btnLogin" id="btnLogin">Log In</button>
                          
            <div class="sign-up-link"></div>
            <p class="btn-signup">Don't have an account? <a href="register.html"> Register here</a></p>
          
        </div>
    </div>
    </form>
   
      <script  src="../js files/intro.js"></script>
</body>
</html>
